<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Creative Career Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0F0A1E; --surface: #1A1130; --border: rgba(255,255,255,0.1); }
    html, body { min-height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── ENTRY SCREEN ── */
    #s-entry {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 40px 28px;
      background: linear-gradient(150deg, #1E0A3C 0%, #0F0A1E 100%);
    }
    .entry-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 100px; padding: 8px 18px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 40px;
    }
    .entry-icon { font-size: 72px; display: block; margin-bottom: 28px; }
    .entry-title { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 14px; }
    .entry-sub { font-size: 16px; opacity: 0.6; line-height: 1.6; max-width: 340px; margin: 0 auto 40px; }
    .entry-input {
      display: block; width: 100%; max-width: 320px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px; padding: 18px 22px; font-family: inherit;
      font-size: 18px; font-weight: 700; color: #fff; text-align: center;
      outline: none; margin-bottom: 20px; transition: border-color 0.2s;
    }
    .entry-input::placeholder { color: rgba(255,255,255,0.3); }
    .entry-input:focus { border-color: rgba(255,255,255,0.5); }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #7B2FBE, #4338CA);
      color: #fff; border: none; border-radius: 100px;
      padding: 18px 36px; font-family: inherit; font-size: 17px; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 32px rgba(123,47,190,0.4);
      transition: transform 0.12s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .error-msg { color: #F87171; font-size: 14px; font-weight: 600; margin-top: 16px; min-height: 20px; }

    /* ── LOADING ── */
    #s-loading {
      display: none; min-height: 100vh;
      align-items: center; justify-content: center; flex-direction: column;
      background: linear-gradient(150deg, #1E0A3C 0%, #0F0A1E 100%);
      gap: 24px;
    }
    .spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #7B2FBE;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; opacity: 0.6; font-weight: 600; }

    /* ── RESULTS ── */
    #s-results {
      display: none; min-height: 100vh;
      flex-direction: column; align-items: center;
      padding: 40px 20px 80px;
      background: linear-gradient(150deg, #1E0A3C 0%, #0F0A1E 100%);
    }

    .results-header {
      text-align: center; margin-bottom: 36px;
    }
    .results-greeting { font-size: 14px; opacity: 0.5; font-weight: 600; margin-bottom: 8px; }
    .results-name { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
    .results-sub { font-size: 15px; opacity: 0.5; }

    /* Four day badges row */
    .days-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; width: 100%; max-width: 420px; margin-bottom: 32px;
    }
    .day-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 16px; text-align: center;
    }
    .day-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
    .day-mini-icon { width: 48px; height: 48px; margin: 0 auto 8px; }
    .day-persona { font-size: 14px; font-weight: 800; }
    .day-quiz-name { font-size: 11px; opacity: 0.5; margin-top: 3px; line-height: 1.3; }

    /* Combined persona */
    .combined-section {
      width: 100%; max-width: 420px; margin-bottom: 20px; text-align: center;
    }
    .combined-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.4; margin-bottom: 20px; display: block;
    }
    .combined-icon {
      width: 160px; height: 160px; margin: 0 auto 20px;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .combined-persona-name {
      font-size: 40px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #C084FC, #818CF8, #67E8F9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: slideUp 0.4s 0.2s ease both;
    }
    .combined-tagline { font-size: 16px; opacity: 0.6; font-style: italic; margin-bottom: 28px; animation: slideUp 0.4s 0.3s ease both; }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .profile-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 22px; padding: 24px; text-align: left;
      width: 100%; max-width: 420px; margin-bottom: 16px;
      animation: slideUp 0.4s 0.4s ease both;
    }
    .profile-card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.4; margin-bottom: 14px;
    }
    .profile-text { font-size: 15px; line-height: 1.75; opacity: 0.88; }

    .strengths-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      width: 100%; max-width: 420px; margin-bottom: 16px;
      animation: slideUp 0.4s 0.5s ease both;
    }
    .strength-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 14px 16px;
    }
    .strength-icon { font-size: 22px; margin-bottom: 8px; }
    .strength-title { font-size: 13px; font-weight: 800; margin-bottom: 4px; }
    .strength-desc { font-size: 12px; opacity: 0.55; line-height: 1.4; }

    .careers-big-card {
      width: 100%; max-width: 420px;
      background: linear-gradient(135deg, #7B2FBE, #4338CA);
      border-radius: 22px; padding: 24px; margin-bottom: 16px;
      animation: slideUp 0.4s 0.6s ease both;
    }
    .careers-big-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; margin-bottom: 16px; }
    .careers-big-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .career-chip { background: rgba(255,255,255,0.18); border-radius: 100px; padding: 8px 16px; font-size: 14px; font-weight: 700; }

    .not-found-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 22px; padding: 32px; text-align: center; width: 100%; max-width: 420px;
    }
    .not-found-icon { font-size: 48px; margin-bottom: 16px; }
    .not-found-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .not-found-text { font-size: 15px; opacity: 0.6; line-height: 1.6; margin-bottom: 20px; }

    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

    /* email toast */
    .email-toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,40,0.92); backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 100px; padding: 14px 28px;
      font-size: 14px; font-weight: 700; color: #fff;
      white-space: nowrap; z-index: 1000;
      animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both, toastOut 0.4s 5s ease forwards;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(10px); } }

    /* email card at bottom of results */
    .email-card {
      width: 100%; max-width: 420px; margin-top: 16px;
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
      animation: slideUp 0.4s 0.7s ease both;
    }
    .email-card-icon { font-size: 28px; flex-shrink: 0; }
    .email-card-text { font-size: 13px; opacity: 0.5; margin-top: 2px; }
    .email-card-title { font-size: 15px; font-weight: 800; }
  </style>
</head>

function getTraits(personaNames) {
  const totals = { visual:0, maker:0, narrative:0, strategic:0, social:0, innovation:0 };
  personaNames.forEach(n => {
    const t = TRAIT_MAP[n];
    if (t) Object.keys(t).forEach(k => totals[k] += t[k]);
  });
  return totals;
}

function pickCombinedPersona(traits) {
  for (const p of COMBINED_PERSONAS) {
    if (p.match(traits)) return p;
  }
  return COMBINED_PERSONAS[COMBINED_PERSONAS.length - 1];
}

// ── MAIN FLOW ──
async function lookupResults() {
  const name = document.getElementById('name-in').value.trim();
  if (!name) { document.getElementById('error-msg').textContent = 'Please enter your name first.'; return; }
  studentEmail = document.getElementById('email-in').value.trim();

  document.getElementById('s-entry').style.display = 'none';
  document.getElementById('s-loading').style.display = 'flex';

  try {
    const records = await fetchAirtable(name);
    if (!records || records.length === 0) {
      showNotFound(name);
      return;
    }
    renderResults(name, records);
  } catch(e) {
    document.getElementById('s-loading').style.display = 'none';
    document.getElementById('s-entry').style.display = 'flex';
    document.getElementById('error-msg').textContent = 'Something went wrong. Please try again.';
    console.error(e);
  }
}

async function fetchAirtable(name) {
  if (!AT_TOKEN || AT_TOKEN.startsWith('YOUR_')) {
    // Demo mode — return sample data
    return [
      { fields: { 'Quiz Number': 1, 'Persona Name': 'The Artist' } },
      { fields: { 'Quiz Number': 2, 'Persona Name': 'The Visionary' } },
      { fields: { 'Quiz Number': 3, 'Persona Name': 'The Innovator' } },
      { fields: { 'Quiz Number': 4, 'Persona Name': 'The Dreamer' } },
    ];
  }
  const formula = encodeURIComponent(`{Name}="${name}"`);
  const url = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(AT_TABLE)}?filterByFormula=${formula}&sort[0][field]=Day&sort[0][direction]=asc`;
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${AT_TOKEN}` } });
  if (!res.ok) throw new Error(`Airtable error: ${res.status}`);
  const data = await res.json();
  return data.records || [];
}

function showNotFound(name) {
  document.getElementById('s-loading').style.display = 'none';
  const el = document.getElementById('s-results');
  el.style.display = 'flex';
  el.innerHTML = `
    <div class="not-found-card">
      <div class="not-found-icon">🔍</div>
      <h2 class="not-found-title">No results found for "${name}"</h2>
      <p class="not-found-text">Make sure you used the same name on all four quizzes. Even small differences (like "Alex" vs "Alexander") won't match.</p>
      <button class="btn" onclick="location.reload()">Try again</button>
    </div>`;
}

function renderResults(name, records) {
  document.getElementById('s-loading').style.display = 'none';
  const el = document.getElementById('s-results');
  el.style.display = 'flex';

  document.getElementById('r-name').textContent = name;

  // Build day results map
  const byDay = {};
  records.forEach(r => { byDay[r.fields['Day']] = r.fields['Persona']; });

  const DAY_LABELS = ['', 'What Kind of Creator?', 'How You Make Things Happen', 'What Fuels Your Fire', 'Your Creative Superpower'];

  // Render day cards
  const daysRow = document.getElementById('days-row');
  daysRow.innerHTML = '';
  for (let d = 1; d <= 4; d++) {
    const pName = byDay[d] || '—';
    const pm = PERSONA_MINI[pName] || { icon: '<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="rgba(255,255,255,0.1)"/></svg>', color: '#666' };
    daysRow.innerHTML += `
      <div class="day-card">
        <p class="day-label">Day ${d}</p>
        <div class="day-mini-icon">${pm.icon}</div>
        <p class="day-persona" style="color:${pm.color}">${pName}</p>
        <p class="day-quiz-name">${DAY_LABELS[d]}</p>
      </div>`;
  }

  // Compute combined persona
  const personaNames = [byDay[1], byDay[2], byDay[3], byDay[4]].filter(Boolean);
  const traits = getTraits(personaNames);
  const cp = pickCombinedPersona(traits);

  document.getElementById('combined-icon').innerHTML = cp.icon;
  document.getElementById('combined-name').textContent = cp.name;
  document.getElementById('combined-tagline').textContent = `"${cp.tagline}"`;
  document.getElementById('combined-desc').textContent = cp.desc;

  const sg = document.getElementById('strengths-grid');
  sg.innerHTML = cp.strengths.map(s => `
    <div class="strength-card">
      <div class="strength-icon">${s.icon}</div>
      <div class="strength-title">${s.title}</div>
      <div class="strength-desc">${s.desc}</div>
    </div>`).join('');

  document.getElementById('combined-careers').innerHTML = cp.careers.map(c => `<span class="career-chip">${c}</span>`).join('');

  // Email card
  el.insertAdjacentHTML('beforeend', `
    <div class="email-card">
      <div class="email-card-icon">✉️</div>
      <div>
        <div class="email-card-title">${studentEmail ? 'Results sent to ' + studentEmail : 'Results delivered'}</div>
        <div class="email-card-text">Save or screenshot this page to keep your profile</div>
      </div>
    </div>`);

  launchConfetti();

  // Save completion record to Airtable (with email + combined persona)
  if (!AT_TOKEN.startsWith('YOUR_')) {
    saveCompletionRecord(name, studentEmail, cp.name, byDay);
  }
}

async function saveCompletionRecord(name, email, combinedPersona, byDay) {
  try {
    await fetch(`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(AT_TABLE)}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: {
        Name: name,
        Email: email || '',
        Day: 0,
        Persona: combinedPersona,
        Timestamp: new Date().toISOString()
      }})
    });
  } catch(e) { console.warn('Airtable completion save error:', e); }
}

async function sendResultsEmail(name, email, cp, byDay) {
  try {
    await emailjs.send(EJ_SERVICE, EJ_TEMPLATE, {
      to_name:          name,
      to_email:         email,
      persona_name:     cp.name,
      persona_tagline:  cp.tagline,
      persona_desc:     cp.desc,
      day1:             byDay[1] || '—',
      day2:             byDay[2] || '—',
      day3:             byDay[3] || '—',
      day4:             byDay[4] || '—',
      careers:          cp.careers.join(', '),
    });
    showToast('✉️ Results sent to ' + email);
  } catch(err) {
    console.error('EmailJS error:', err);
    showToast('⚠️ Could not send email — save this page instead');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'email-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#C084FC','#818CF8','#67E8F9','#F9A8D4','#FCD34D','#86EFAC','#fff'];
  const pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width, y: -20, w: Math.random()*12+5, h: Math.random()*7+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*5, vy: Math.random()*5+2,
    rot: Math.random()*360, rv: (Math.random()-0.5)*10, life: 1
  }));
  let done = false;
  function draw() {
    if (done) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rv; p.life -= 0.006;
      ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    });
    if (pieces.every(p => p.life <= 0)) done = true;
    requestAnimationFrame(draw);
  }
  draw();
}
